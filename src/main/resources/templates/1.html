<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>QR Code in Laptop Screen</title>
    <style>
        /* Reset */
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .page-container {
            text-align: center;
            max-width: 680px;
            padding: 20px;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        /* Laptop container */
        .laptop-wrapper {
            position: relative;
            width: 600px;
            margin: 0 auto 2rem auto;
        }
        .laptop-image {
            width: 100%;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* QR code positioned inside screen */
        .qr-code {
            position: absolute;
            /* Positioning QR code inside laptop screen */
            top: 70px; /* adjust vertical position */
            left: 105px; /* adjust horizontal position */
            width: 390px; /* qr code width */
            height: 390px; /* qr code height */
            border: 16px solid white;  /* optional: frame around QR */
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            background: white;
        }

        /* Optional: info section */
        .info {
            font-size: 18px;
            color: #f0f0f0;
            max-width: 540px;
            margin: 0 auto;
        }
        .info p {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
<div class="page-container">
    <h1>Your QR Code inside Laptop</h1>
    <div class="laptop-wrapper">
        <!-- Laptop base image -->
        <img class="laptop-image" src="https://i.imgur.com/3kNVPcC.png" alt="Laptop"/>

        <!-- QR code overlay -->
        <img class="qr-code" th:src="'data:image/png;base64,' + ${qrCode}" alt="QR Code"/>
    </div>

    <div class="info">
        <p><strong>Text encoded:</strong> <span th:text="${text}"></span></p>
        <p>Created by Your Name | <a href="mailto:your.email@example.com" style="color: #bbe1fa;">your.email@example.com</a></p>
    </div>
</div>
</body>
</html>
