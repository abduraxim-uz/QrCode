<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        :root {
            --bg-1: #f5f5f7;
            --bg-2: #e9ecf3;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: rgba(29, 29, 31, 0.08);
            --panel: rgba(255, 255, 255, 0.78);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --accent: #0071e3;
            --accent-hover: #005ec3;
            --shadow: 0 30px 80px rgba(15, 23, 42, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(0, 113, 227, 0.14), transparent 28%),
                    radial-gradient(circle at bottom right, rgba(94, 92, 230, 0.12), transparent 24%),
                    linear-gradient(180deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            display: grid;
            place-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 24px;
        }

        .qr-code-container {
            width: min(100%, 440px);
            margin: auto;
            padding: 32px;
            border-radius: 32px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 1;
            letter-spacing: -0.05em;
            font-weight: 700;
            padding: 12px 0 24px;
        }

        .qr-frame {
            width: 100%;
            min-height: 236px;
            border-radius: 28px;
            background: var(--panel-strong);
            box-shadow:
                    inset 0 0 0 1px var(--line),
                    0 12px 30px rgba(15, 23, 42, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            display: block;
        }

        img:empty,
        img[src=""],
        img:not([src]) {
            display: none;
        }

        #baseURLText {
            display: none;
        }

        .field {
            width: 100%;
            height: 54px;
            margin-top: 12px;
            padding: 0 18px;
            border-radius: 16px;
            border: 1px solid rgba(29, 29, 31, 0.14);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            font: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .field:focus {
            border-color: rgba(0, 113, 227, 0.4);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
            transform: translateY(-1px);
        }

        #responseMsg {
            min-height: 20px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .qr-code-container {
                padding: 22px;
                border-radius: 24px;
            }

            .qr-frame {
                min-height: 210px;
                padding: 16px;
            }

            img {
                width: 170px;
                height: 170px;
            }

        }
    </style>
</head>

<body>
<div class="qr-code-container">
    <h1>QrCode Generator</h1>

    <div class="qr-frame">
        <img th:if="${qrCode != null}" th:src="'data:image/png;base64,' + ${qrCode}" alt="QR Code" />
    </div>

    <p id="baseURLText" th:text="${baseUrl}"></p>
    <input id="userInput" class="field" type="text" placeholder="Matn kiriting">
    <div id="responseMsg"></div>
</div>

<script>
    let qrImage = document.querySelector('img[alt="QR Code"]');
    const container = document.querySelector('.qr-frame');
    const responseMsg = document.getElementById('responseMsg');

    if (!qrImage) {
        qrImage = document.createElement('img');
        qrImage.alt = 'QR Code';
        qrImage.style.display = 'none';
        container.appendChild(qrImage);
    }

    container.style.display = 'none';

    if (qrImage) {
        const currentSrc = qrImage.getAttribute('src');

        if (!currentSrc || currentSrc === 'data:image/png;base64,') {
            qrImage.style.display = 'none';
        }

        qrImage.addEventListener('load', () => {
            container.style.display = 'flex';
            qrImage.style.display = 'block';
        });

        qrImage.addEventListener('error', () => {
            container.style.display = 'none';
            qrImage.style.display = 'none';
        });
    }

    document.getElementById('userInput').addEventListener('input', (event) => {
        const inputValue = event.target.value;
        const baseURL = document.getElementById('baseURLText').textContent;

        if (!inputValue.trim()) {
            qrImage.removeAttribute('src');
            qrImage.style.display = 'none';
            container.style.display = 'none';
            responseMsg.textContent = '';
            return;
        }
        const qrApiBase = `${baseURL}/qr/` || 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=';
        qrImage.src = qrApiBase + encodeURIComponent(inputValue);
        responseMsg.textContent = '';
    });
</script>
</body>

</html>
